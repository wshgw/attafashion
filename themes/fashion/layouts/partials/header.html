<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">{{ .Site.Title }}</a>
    <button class="menu-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-main">
      <a href="/" class="{{ if .IsHome }}active{{ end }}">Home</a>
      <a href="/categories/trends/">Trends</a>
      <a href="/categories/streetwear/">Streetwear</a>
      <a href="/categories/sustainable-fashion/">Sustainable</a>
      <a href="/about/">About</a>
    </nav>
  </div>
</header>
<script>
document.querySelector('.menu-toggle')?.addEventListener('click', function() {
  document.querySelector('.nav-main').classList.toggle('open');
  this.classList.toggle('open');
});
</script>
