{{ define "main" }}
<section class="list-page">
  <h1>{{ .Title }}</h1>
  <div class="post-grid">
    {{ range .Pages }}
    <article class="post-card">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      <div class="meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
      </div>
      <p>{{ .Summary | plainify | truncate 80 }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
