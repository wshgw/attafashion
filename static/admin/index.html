<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Generator · attafashion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1a1a1a;
      --text-light: #666;
      --text-muted: #999;
      --border: #e8e8e8;
      --accent: #8B0000;
      --accent-hover: #a00000;
      --bg: #fff;
      --bg-light: #f8f8f8;
      --font: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-light);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px;
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sub {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      font-family: var(--font);
      transition: border-color .2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .status.loading { display: block; background: #fff3cd; color: #856404; }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
    .status a { color: inherit; font-weight: 600; text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #856404;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Brand Generator</h1>
    <p class="sub">Enter brand name + affiliate link. Landing page + 3 articles will be generated and published automatically.</p>

    <form id="form">
      <div class="field">
        <label for="brand">Brand Name</label>
        <input type="text" id="brand" placeholder="e.g. Merry People" required>
      </div>
      <div class="field">
        <label for="url">Affiliate URL</label>
        <input type="url" id="url" placeholder="https://app.partnermatic.com/track/..." required>
      </div>
      <div class="field">
        <label for="password">Admin Password</label>
        <input type="password" id="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="btn" id="btn">Generate &amp; Publish</button>
    </form>

    <div id="status" class="status"></div>
    <p class="hint">Takes 1-2 minutes. Site auto-deploys after generation.</p>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const brand = document.getElementById('brand').value.trim();
      const url = document.getElementById('url').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!brand || !url || !password) return;

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      status.className = 'status loading';
      status.innerHTML = '<span class="spinner"></span>Generating content via DeepSeek...';

      try {
        const res = await fetch('/api/generate-brand', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brand, affiliateUrl: url, password })
        });
        const data = await res.json();

        if (data.success) {
          let html = '<strong>Published!</strong><br><br>';
          data.files.forEach(f => {
            const p = f.replace(/^content\//, '');
            const u = p.replace(/^brands\/(.+)\/index\.md$/, '/brands/$1/')
                       .replace(/^posts\/(.+)\.md$/, '/posts/$1/')
                       .replace(/\/index\.md$/, '/');
            html += '<a href="https://www.attafashion.com' + u + '" target="_blank">' + f + '</a><br>';
          });
          html += '<br><small>Cloudflare build completes in ~2 minutes.</small>';
          status.className = 'status success';
          status.innerHTML = html;
        } else {
          status.className = 'status error';
          status.innerHTML = '<strong>Error:</strong> ' + (data.error || 'Unknown');
        }
      } catch (err) {
        status.className = 'status error';
        status.innerHTML = '<strong>Error:</strong> ' + err.message;
      }

      btn.disabled = false;
      btn.textContent = 'Generate & Publish';
    });
  </script>
</body>
</html>
